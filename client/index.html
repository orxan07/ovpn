<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WireGuard Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; padding: 24px; }
    h1 { font-size: 20px; font-weight: 600; color: #fff; }
    .card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 8px 12px; font-size: 12px; font-weight: 500; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #2d3148; }
    td { padding: 12px; font-size: 14px; border-bottom: 1px solid #1e2235; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .badge.active { background: #14532d; color: #4ade80; }
    .badge.inactive { background: #1c1917; color: #78716c; }
    .btn { padding: 6px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.8; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-danger { background: #7f1d1d; color: #fca5a5; }
    .btn-ghost { background: #2d3148; color: #94a3b8; }
    .btn-icon { background: none; border: none; cursor: pointer; color: #64748b; padding: 4px; font-size: 14px; line-height: 1; }
    .btn-icon:hover { color: #e2e8f0; }
    .form-row { display: flex; gap: 10px; align-items: center; }
    input[type=text], input[type=password] { background: #0f1117; border: 1px solid #2d3148; border-radius: 8px; color: #e2e8f0; padding: 8px 12px; font-size: 14px; outline: none; }
    input[type=text]:focus, input[type=password]:focus { border-color: #3b82f6; }
    .name-view { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .name-view:hover .btn-icon { color: #e2e8f0; }
    .name-edit { display: none; align-items: center; gap: 6px; }
    .name-edit input { padding: 4px 8px; font-size: 13px; width: 120px; }
    .error { color: #f87171; font-size: 13px; }

    /* Login */
    #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: -24px; }
    .login-box { background: #1a1d27; border: 1px solid #2d3148; border-radius: 16px; padding: 32px; width: 100%; max-width: 360px; }
    .login-box h2 { font-size: 18px; margin-bottom: 20px; color: #fff; }
    .login-box input { width: 100%; margin-bottom: 12px; }
    .login-box button { width: 100%; }
    #mainScreen { display: none; }

    /* Detail panel */
    #detailPanel { display: none; }
    .back-btn { display: flex; align-items: center; gap: 8px; color: #64748b; cursor: pointer; font-size: 14px; margin-bottom: 20px; background: none; border: none; }
    .back-btn:hover { color: #e2e8f0; }
    .detail-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
    .detail-name { font-size: 24px; font-weight: 600; color: #fff; }
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid #2d3148; margin-bottom: 20px; }
    .tab { padding: 8px 16px; font-size: 14px; cursor: pointer; border: none; background: none; color: #64748b; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tab.active { color: #3b82f6; border-bottom-color: #3b82f6; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .info-item { background: #0f1117; border-radius: 8px; padding: 12px 16px; }
    .info-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .info-value { font-size: 14px; font-family: monospace; color: #e2e8f0; word-break: break-all; }
    .qr-container { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .qr-container img { max-width: 280px; border-radius: 12px; background: #fff; padding: 12px; }
    pre { background: #0f1117; border-radius: 8px; padding: 16px; font-size: 12px; overflow-x: auto; color: #94a3b8; line-height: 1.6; }
    .copy-btn { display: flex; align-items: center; gap: 6px; }
    .singbox-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .bytes { color: #64748b; font-size: 12px; }
    .peer-name-link { color: #e2e8f0; text-decoration: none; font-weight: 500; cursor: pointer; }
    .peer-name-link:hover { color: #3b82f6; }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="loginScreen">
    <div class="login-box">
      <h2>WireGuard Admin</h2>
      <input type="password" id="tokenInput" placeholder="Auth token" onkeydown="if(event.key==='Enter') login()" />
      <button class="btn btn-primary" onclick="login()">Войти</button>
      <span id="loginError" class="error" style="display:block; margin-top:8px;"></span>
    </div>
  </div>

  <!-- Main: список клиентов -->
  <div id="mainScreen">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
      <h1>WireGuard Admin</h1>
      <button class="btn btn-ghost" onclick="logout()">Выйти</button>
    </div>

    <div class="card">
      <div class="form-row">
        <input type="text" id="newName" placeholder="Имя нового клиента" onkeydown="if(event.key==='Enter') addPeer()" />
        <button class="btn btn-primary" onclick="addPeer()">Добавить</button>
        <span id="addError" class="error"></span>
      </div>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Имя</th>
            <th>IP</th>
            <th>Статус</th>
            <th>Последний handshake</th>
            <th>Трафик</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="peersBody">
          <tr><td colspan="6" style="color:#64748b; text-align:center; padding:24px;">Загрузка...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Detail: страница клиента -->
  <div id="detailPanel">
    <button class="back-btn" onclick="showList()">← Все клиенты</button>

    <div class="detail-header">
      <div>
        <div id="detailNameView" class="name-view">
          <span id="detailName" class="detail-name"></span>
          <button class="btn-icon" onclick="startRename()" title="Переименовать">✏️</button>
        </div>
        <div id="detailNameEdit" class="name-edit">
          <input type="text" id="renameInput" />
          <button class="btn btn-sm btn-primary" onclick="submitRename()">Сохранить</button>
          <button class="btn btn-sm btn-ghost" onclick="cancelRename()">Отмена</button>
          <span id="renameError" class="error"></span>
        </div>
        <div style="margin-top:6px;">
          <span id="detailBadge" class="badge"></span>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('info')">Информация</button>
      <button class="tab" onclick="switchTab('wg')">WireGuard</button>
      <button class="tab" onclick="switchTab('singbox')">sing-box</button>
    </div>

    <!-- Вкладка: Информация -->
    <div id="tab-info" class="tab-content active">
      <div class="info-grid" id="infoGrid"></div>
    </div>

    <!-- Вкладка: WireGuard -->
    <div id="tab-wg" class="tab-content">
      <div class="qr-container">
        <img id="wgQrImg" src="" alt="QR" />
        <div class="copy-btn">
          <button class="btn btn-ghost" onclick="copyConf()">Скопировать конфиг</button>
        </div>
        <pre id="wgConf"></pre>
      </div>
    </div>

    <!-- Вкладка: sing-box -->
    <div id="tab-singbox" class="tab-content">
      <div class="singbox-tabs">
        <button class="btn btn-primary" id="sbMobileBtn" onclick="loadSingbox('mobile')">Мобильная сеть</button>
        <button class="btn btn-ghost" id="sbWifiBtn" onclick="loadSingbox('wifi')">Wi-Fi</button>
      </div>
      <div class="copy-btn" style="margin-bottom:12px;">
        <button class="btn btn-ghost" onclick="copySingbox()">Скопировать</button>
      </div>
      <pre id="singboxConf"></pre>
    </div>
  </div>

  <script>
    let TOKEN = localStorage.getItem('wg_token');
    let refreshTimer = null;
    let currentPeer = null;
    let singboxMode = 'mobile';

    if (TOKEN) showMain();

    // --- Auth ---

    async function login() {
      const token = document.getElementById('tokenInput').value.trim();
      const errEl = document.getElementById('loginError');
      errEl.textContent = '';
      if (!token) { errEl.textContent = 'Введите токен'; return; }
      const res = await fetch('/api/peers', { headers: { 'Authorization': `Bearer ${token}` } });
      if (res.status === 401) { errEl.textContent = 'Неверный токен'; return; }
      TOKEN = token;
      localStorage.setItem('wg_token', token);
      showMain();
    }

    function logout() {
      localStorage.removeItem('wg_token');
      TOKEN = null;
      clearInterval(refreshTimer);
      document.getElementById('mainScreen').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('tokenInput').value = '';
    }

    function showMain() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('detailPanel').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'block';
      loadPeers();
      clearInterval(refreshTimer);
      refreshTimer = setInterval(loadPeers, 15000);
    }

    function showList() {
      clearInterval(refreshTimer);
      document.getElementById('detailPanel').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'block';
      loadPeers();
      refreshTimer = setInterval(loadPeers, 15000);
    }

    // --- API ---

    async function api(method, path, body) {
      const res = await fetch(path, {
        method,
        headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
        body: body ? JSON.stringify(body) : undefined,
      });
      if (res.status === 401) { logout(); return null; }
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        throw new Error(err.error || res.statusText);
      }
      const ct = res.headers.get('content-type');
      if (ct && ct.includes('application/json')) return res.json();
      return res.text();
    }

    // --- Helpers ---

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1024 / 1024).toFixed(1) + ' MB';
    }

    function formatAgo(seconds) {
      if (seconds === null || seconds === undefined) return '—';
      if (seconds < 60) return `${seconds}с назад`;
      if (seconds < 3600) return `${Math.floor(seconds / 60)}м назад`;
      return `${Math.floor(seconds / 3600)}ч назад`;
    }

    // --- List ---

    async function loadPeers() {
      try {
        const peers = await api('GET', '/api/peers');
        if (!peers) return;
        const tbody = document.getElementById('peersBody');
        if (!peers.length) {
          tbody.innerHTML = '<tr><td colspan="6" style="color:#64748b; text-align:center; padding:24px;">Нет клиентов</td></tr>';
          return;
        }
        tbody.innerHTML = peers.map(p => `
          <tr>
            <td>
              <span class="peer-name-link" onclick="openDetail('${p.name}')">${p.name}</span>
            </td>
            <td style="font-family:monospace">${p.ip || '—'}</td>
            <td><span class="badge ${p.active ? 'active' : 'inactive'}">${p.active ? 'активен' : 'неактивен'}</span></td>
            <td>${formatAgo(p.lastHandshakeAgo)}</td>
            <td class="bytes">↓ ${formatBytes(p.rx)} / ↑ ${formatBytes(p.tx)}</td>
            <td style="display:flex; gap:6px; justify-content:flex-end">
              <button class="btn btn-sm btn-ghost" onclick="openDetail('${p.name}')">Детали</button>
              <button class="btn btn-sm btn-danger" onclick="deletePeer('${p.name}')">Удалить</button>
            </td>
          </tr>
        `).join('');
      } catch (e) {
        document.getElementById('peersBody').innerHTML = `<tr><td colspan="6" style="color:#f87171; text-align:center">${e.message}</td></tr>`;
      }
    }

    async function addPeer() {
      const name = document.getElementById('newName').value.trim();
      const errEl = document.getElementById('addError');
      errEl.textContent = '';
      if (!name) { errEl.textContent = 'Введите имя'; return; }
      try {
        await api('POST', '/api/peers', { name });
        document.getElementById('newName').value = '';
        await loadPeers();
        openDetail(name);
      } catch (e) {
        errEl.textContent = e.message;
      }
    }

    async function deletePeer(name) {
      if (!confirm(`Удалить клиента ${name}?`)) return;
      try {
        await api('DELETE', `/api/peers/${name}`);
        loadPeers();
      } catch (e) {
        alert(e.message);
      }
    }

    // --- Detail ---

    async function openDetail(name) {
      currentPeer = name;
      clearInterval(refreshTimer);
      document.getElementById('mainScreen').style.display = 'none';
      document.getElementById('detailPanel').style.display = 'block';

      // Сброс вкладок
      switchTab('info');
      document.getElementById('wgQrImg').src = '';
      document.getElementById('wgConf').textContent = '';
      document.getElementById('singboxConf').textContent = '';

      await refreshDetail();
    }

    async function refreshDetail() {
      try {
        const p = await api('GET', `/api/peers/${currentPeer}`);
        if (!p) return;

        document.getElementById('detailName').textContent = p.name;
        document.getElementById('renameInput').value = p.name;
        const badge = document.getElementById('detailBadge');
        badge.textContent = p.active ? 'активен' : 'неактивен';
        badge.className = `badge ${p.active ? 'active' : 'inactive'}`;

        document.getElementById('infoGrid').innerHTML = [
          ['IP в туннеле', p.ip || '—'],
          ['Публичный ключ', p.pubkey],
          ['Endpoint', p.endpoint || '—'],
          ['Последний handshake', formatAgo(p.lastHandshakeAgo)],
          ['Получено', formatBytes(p.rx)],
          ['Отправлено', formatBytes(p.tx)],
        ].map(([label, value]) => `
          <div class="info-item">
            <div class="info-label">${label}</div>
            <div class="info-value">${value}</div>
          </div>
        `).join('');
      } catch (e) {
        alert(e.message);
      }
    }

    async function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        const tabs = ['info', 'wg', 'singbox'];
        t.classList.toggle('active', tabs[i] === tab);
      });
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');

      if (tab === 'wg') await loadWgTab();
      if (tab === 'singbox') await loadSingbox('mobile');
    }

    async function loadWgTab() {
      if (document.getElementById('wgQrImg').src && document.getElementById('wgQrImg').src !== window.location.href) return;
      try {
        const [{ qr }, conf] = await Promise.all([
          api('GET', `/api/peers/${currentPeer}/qr`),
          api('GET', `/api/peers/${currentPeer}/config`),
        ]);
        document.getElementById('wgQrImg').src = `data:image/png;base64,${qr}`;
        document.getElementById('wgConf').textContent = conf;
      } catch (e) {
        document.getElementById('wgConf').textContent = e.message;
      }
    }

    async function loadSingbox(mode) {
      singboxMode = mode;
      document.getElementById('sbMobileBtn').className = `btn ${mode === 'mobile' ? 'btn-primary' : 'btn-ghost'}`;
      document.getElementById('sbWifiBtn').className = `btn ${mode === 'wifi' ? 'btn-primary' : 'btn-ghost'}`;
      document.getElementById('singboxConf').textContent = 'Загрузка...';
      try {
        const conf = await api('GET', `/api/peers/${currentPeer}/singbox?mode=${mode}`);
        document.getElementById('singboxConf').textContent = JSON.stringify(conf, null, 2);
      } catch (e) {
        document.getElementById('singboxConf').textContent = e.message;
      }
    }

    function copyConf() {
      navigator.clipboard.writeText(document.getElementById('wgConf').textContent);
    }

    function copySingbox() {
      navigator.clipboard.writeText(document.getElementById('singboxConf').textContent);
    }

    // --- Rename ---

    function startRename() {
      document.getElementById('detailNameView').style.display = 'none';
      document.getElementById('detailNameEdit').style.display = 'flex';
      document.getElementById('renameInput').focus();
    }

    function cancelRename() {
      document.getElementById('detailNameEdit').style.display = 'none';
      document.getElementById('detailNameView').style.display = 'flex';
      document.getElementById('renameError').textContent = '';
    }

    async function submitRename() {
      const newName = document.getElementById('renameInput').value.trim();
      const errEl = document.getElementById('renameError');
      errEl.textContent = '';
      if (!newName || newName === currentPeer) { cancelRename(); return; }
      try {
        await api('PATCH', `/api/peers/${currentPeer}`, { newName });
        currentPeer = newName;
        cancelRename();
        await refreshDetail();
      } catch (e) {
        errEl.textContent = e.message;
      }
    }
  </script>
</body>
</html>
